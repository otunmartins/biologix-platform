name: Build and publish Docker image

# Triggers:
#  - push of a version tag (v0.4.0, etc.)  → builds full image + pushes to GHCR
#  - manual workflow_dispatch               → build only (no push) unless a tag is given
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR after build?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      slim:
        description: "Build slim image (defers models to first run)?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/biologix-ai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' || inputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

      - name: Determine SLIM flag
        id: slim
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.slim }}" == "true" ]]; then
            echo "value=1" >> "$GITHUB_OUTPUT"
          else
            echo "value=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (and push) Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SLIM=${{ steps.slim.outputs.value }}
          # Cache layers in GHCR to speed up re-builds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
