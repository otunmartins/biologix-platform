# Explicit project name — avoids defaulting to the clone folder name (e.g. insulin-ai).
name: biologix-ai

services:
  biologix:
    build:
      context: .
      dockerfile: Dockerfile
      # ambertools and several other conda-forge packages have no linux/aarch64
      # builds.  Force amd64 so the image works on both Apple Silicon (via
      # Rosetta 2) and any x86 Linux host.
      platforms:
        - linux/amd64
      args:
        # Set SLIM=1 to build a smaller image that downloads models on first run
        SLIM: ${SLIM:-0}
        OPENCODE_VERSION: ${OPENCODE_VERSION:-1.17.4}
    image: biologix-ai:local
    init: true         # tini as PID 1 — better signal forwarding for the OpenCode TUI
    stdin_open: true   # keeps STDIN open for the TUI
    tty: true          # allocates a TTY (required for OpenCode TUI)
    env_file:
      # Copy .env.example → .env and fill in your LLM key before running.
      # Missing file is silently ignored so direct -e flags still work.
      - path: .env
        required: false
    environment:
      # Conda libstdc++ (GLIBCXX_3.4.29+) — required by RetroSynAgent/libLerc in treeBuilder
      - LD_LIBRARY_PATH=/opt/conda/envs/biologix-ai-sim/lib
      # Avoid mid-pipeline OpenMM Yes/No prompts (OpenCode TUI can freeze in Docker)
      - BIOLOGIX_AI_OPENMM_AUTO=${BIOLOGIX_AI_OPENMM_AUTO:-yes}
      # Pin OpenMM CPU thread count to 1.  Without this, OpenMM probes available
      # cores via sched_getaffinity which is broken under Rosetta 2 (linux/amd64
      # containers on Apple Silicon).  The broken probe causes the FFTW thread-pool
      # to deadlock on initialisation — the random hang you see at session start or
      # mid-simulation.  Single-threaded is slower but deterministic.
      - OPENMM_CPU_THREADS=1
      # MCP tool wall-clock caps (seconds) — return before OpenCode transport timeout
      - BIOLOGIX_AI_MCP_RETRO_TIMEOUT_S=${BIOLOGIX_AI_MCP_RETRO_TIMEOUT_S:-360}
      - BIOLOGIX_AI_MCP_ADMET_TIMEOUT_S=${BIOLOGIX_AI_MCP_ADMET_TIMEOUT_S:-90}
      - BIOLOGIX_AI_MCP_ADMET_BATCH_TIMEOUT_S=${BIOLOGIX_AI_MCP_ADMET_BATCH_TIMEOUT_S:-180}
      - BIOLOGIX_AI_MCP_MINE_TIMEOUT_S=${BIOLOGIX_AI_MCP_MINE_TIMEOUT_S:-120}
      - BIOLOGIX_AI_MCP_INDEX_TIMEOUT_S=${BIOLOGIX_AI_MCP_INDEX_TIMEOUT_S:-600}
      - BIOLOGIX_AIZYNTH_TIMEOUT=${BIOLOGIX_AIZYNTH_TIMEOUT:-180}
      # Pass through provider keys from host env if not already in .env
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ASTA_API_KEY=${ASTA_API_KEY:-}
    volumes:
      # Session outputs persisted to the host so nothing is lost on container exit
      - ./runs:/app/runs
      # Papers / PDFs used by mine_literature
      - ./papers:/app/papers
      # OpenCode auth state (opencode auth login) persisted across runs
      - opencode-auth:/root/.local/share/opencode
      # Retrosynthesis + AiZynth data (precursor DB, Molport cache, models)
      - biologix-data:/app/data

volumes:
  opencode-auth:
  biologix-data:
